name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linux
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: bun 초기화
        uses: oven-sh/setup-bun@v2

      - name: 패키지 설치
        run: bun install --frozen-lockfile

      - name: 리눅스 타켓 빌드
        run: |
          set -e
          targets=(
            bun-linux-x64
            bun-linux-x64-baseline
            bun-linux-arm64
            bun-linux-x64-musl
            bun-linux-arm64-musl
          )
          mkdir -p bin
          for t in "${targets[@]}"; do
            echo "::group::Building $t"
            bun build src/run.ts --compile --target=$t --outfile=bin/domi-backup-${t#bun-linux-}
            echo "::endgroup::"
          done
          ls -lh bin/

      - name: 릴리즈에 업로드
        uses: softprops/action-gh-release@v2
        with:
          files: linux/bin/*
          generate_release_notes: true
